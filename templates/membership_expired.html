<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>会员已到期 · QuantInvest</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#08111f;color:#e5edf7;font:14px/1.5 system-ui,"Microsoft YaHei"}
    .box{width:min(460px,calc(100vw - 32px));background:#101c2e;border:1px solid #29445f;border-radius:8px;padding:22px}
    h1{margin:0 0 12px;font-size:24px}.muted{color:#8fa4bd}.row{margin:10px 0;padding:10px;background:#0b1423;border-radius:6px}
    a{color:#67e8f9;text-decoration:none}
  </style>
</head>
<body>
  <main class="box">
    <h1>会员已到期</h1>
    <div class="muted">当前账号暂时不能访问 QuantInvest 会员内容，请联系管理员续期。</div>
    <div class="row">账号：{{ member.email }}</div>
    <div class="row">到期日：{{ member.membership_until or "未设置" }}</div>
    <p><a href="{{ url_for('logout') }}">退出并切换账号</a></p>
  </main>
</body>
</html>
