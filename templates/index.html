<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>quantinvest · A股K线</title>
<link rel="stylesheet" href="/static/style.css"/>
<script src="/static/echarts.min.js"></script>
<script src="/static/kline_contract.js"></script>
</head>
<body>
<header>
  <h1>📈 quantinvest</h1>
    {% include "_nav.html" %}
  <details class="usage"><summary>ℹ️ 这个页面怎么用</summary><div>看个股K线与技术形态的浏览工具。输入代码或从自选股点入,切换周期/均线。<b>纯看图,不产生交易信号。</b></div></details>
  <div class="search-wrap">
    <input id="q" type="text" placeholder="输入代码 / 拼音首字母 / 名称 (如 gzmt, 600519, 茅台)" autocomplete="off"/>
    <ul id="suggest" class="suggest hidden"></ul>
  </div>
  <div class="controls">
    <label class="ctrl-group">复权:
      <select id="adjust">
        <option value="qfq" selected>前复权</option>
        <option value="hfq">后复权</option>
        <option value="none">不复权</option>
      </select>
    </label>
    <label class="ctrl-group">区间:
      <select id="days">
        <option value="0" selected>全部</option>
        <option value="60">3 月</option>
        <option value="120">半年</option>
        <option value="250">1 年</option>
        <option value="500">2 年</option>
        <option value="1250">5 年</option>
      </select>
    </label>
    <span class="ctrl-group ind-toggles">指标:
      <label><input type="checkbox" id="ind-boll"/> 布林带</label>
      <label><input type="checkbox" id="ind-macd"/> MACD</label>
      <label><input type="checkbox" id="ind-rsi"/> RSI</label>
      <label><input type="checkbox" id="ind-kdj"/> KDJ</label>
      <label><input type="checkbox" id="ind-bbw"/> 布林带宽</label>
    </span>
    <button id="star" class="ctrl-group" title="加入/移出自选股" disabled style="cursor:pointer;">☆ 自选</button>
    <span class="ctrl-group factor-overlay">因子:
      <select id="f-batch" style="max-width:150px;"></select>
      <select id="f-name" style="max-width:130px;"></select>
      <button id="f-add" style="cursor:pointer;">叠加</button>
      <button id="f-clear" style="cursor:pointer;display:none;">✕</button>
    </span>
  </div>
  <div id="meta" class="meta"></div>
  <div id="freshness" class="freshness hidden"></div>
</header>
<main>
  <div id="chart"></div>
</main>
<footer>
  <span id="status">就绪</span>
  <span class="spacer"></span>
  <a href="/api/health" target="_blank">health</a>
</footer>

<script>
const $q = document.getElementById("q");
const $sug = document.getElementById("suggest");
const $meta = document.getElementById("meta");
const $status = document.getElementById("status");
const $adjust = document.getElementById("adjust");
const $days = document.getElementById("days");
const chart = echarts.init(document.getElementById("chart"));
window.addEventListener("resize", () => chart.resize());
// 容器尺寸变化也触发 resize (F12 打开 / 屏幕分屏 / 窗口拖动)
if (window.ResizeObserver) {
  const ro = new ResizeObserver(() => chart.resize());
  ro.observe(document.getElementById("chart"));
}

let currentCode = "", currentName = "";
let klineRequestNo = 0;
let currentData = null;        // 保存当前 chart 数据
let currentContract = null;    // 当前复权/质量契约
let currentIndex = -1;         // 当前高亮的 K 线索引
let factorSeries = null;       // 因子叠加: 对齐到 currentData.dates 的值数组
let factorName = "";           // 当前叠加的因子名
$adjust.addEventListener("change", () => { if (currentCode) loadKline(currentCode, currentName); });
$days.addEventListener("change", () => { if (currentCode) loadKline(currentCode, currentName); });

// 全局键盘监听:
//   1. ← / →  在 K 线之间移动 (要求 K 线已加载)
//   2. Home / End  跳到首/末
//   3. 任意可打印字符 (字母/数字/中文)  自动跳到搜索框并开始搜索
document.addEventListener("keydown", (e) => {
  // 如果焦点已经在搜索框, 让浏览器自然处理 (不接管)
  if (document.activeElement === $q) return;
  // 其他输入框 (如下拉) 不接管
  const tag = (document.activeElement && document.activeElement.tagName) || "";
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
  // 修饰键组合 (Ctrl+R 刷新, F5 等) 让浏览器处理
  if (e.ctrlKey || e.metaKey || e.altKey) return;

  // K 线导航 (要求当前已加载 K 线数据)
  if (currentData) {
    if (e.key === "ArrowLeft")  { e.preventDefault(); setIndex(currentIndex - 1); return; }
    if (e.key === "ArrowRight") { e.preventDefault(); setIndex(currentIndex + 1); return; }
    if (e.key === "Home")       { e.preventDefault(); setIndex(0); return; }
    if (e.key === "End")        { e.preventDefault(); setIndex(currentData.dates.length - 1); return; }
  }

  // 可打印单字符 (英文/数字/中文) → 跳到搜索框开始搜索
  // e.key.length === 1 排除 "Enter" "Tab" 等命名键
  if (e.key.length === 1 && /^[A-Za-z0-9一-龥]$/.test(e.key)) {
    e.preventDefault();
    $q.value = e.key;       // 替换为新字符 (清掉上次搜索残留)
    $q.focus();
    doSearch();
    return;
  }
  // Backspace 也跳到搜索框 (让用户继续编辑)
  if (e.key === "Backspace") {
    e.preventDefault();
    $q.focus();
    $q.value = $q.value.slice(0, -1);
    doSearch();
    return;
  }
});

// 鼠标点击 K 线区域 → 定位到该日期 (尝试主图 + 成交量两个 grid + dataZoom 兜底)
chart.getZr().on("click", (e) => {
  if (!currentData) return;
  const n = currentData.dates.length;
  // 先尝试各 grid 的精确 convert (主图+成交量+指标面板)
  for (const xi of [0, 1, 2, 3, 4]) {
    const p = chart.convertFromPixel({ xAxisIndex: xi }, [e.offsetX, e.offsetY]);
    if (Array.isArray(p) && !isNaN(p[0]) && p[0] >= 0 && p[0] < n) {
      setIndex(Math.round(p[0]));
      return;
    }
  }
  // 兜底: 根据 dataZoom 可视范围 + 点击 x 比例反推 dataIndex
  const opt = chart.getOption();
  const dz = opt.dataZoom && opt.dataZoom[0];
  if (!dz || dz.start === undefined) return;
  const dom = chart.getDom();
  const rect = dom.getBoundingClientRect();
  // 主图 grid: left=60, right=20 (跟 drawChart 的 grid 配置一致)
  const gridLeft = 60, gridRight = 20;
  const xInChart = e.offsetX - gridLeft;
  const gridWidth = rect.width - gridLeft - gridRight;
  if (xInChart < 0 || xInChart > gridWidth) return;
  const ratioInGrid = xInChart / gridWidth;
  const visibleStart = (dz.start / 100) * (n - 1);
  const visibleEnd = (dz.end / 100) * (n - 1);
  const idx = Math.round(visibleStart + ratioInGrid * (visibleEnd - visibleStart));
  if (idx >= 0 && idx < n) setIndex(idx);
});
// 也监听 ECharts 系列 click (精确捕获点中某根 K 线/某个柱)
chart.on("click", (params) => {
  console.log("[echarts click]", params);
  if (currentData && params && typeof params.dataIndex === "number") {
    setIndex(params.dataIndex);
  }
});

function setIndex(i) {
  if (!currentData) { console.log("[setIndex] no currentData"); return; }
  const n = currentData.dates.length;
  if (i < 0) i = 0;
  if (i >= n) i = n - 1;
  currentIndex = i;
  const dateStr = currentData.dates[i];
  console.log("[setIndex] i=", i, "date=", dateStr);

  // 显示 tooltip + 十字线 (鼠标离开会消失)
  chart.dispatchAction({ type: "showTip", seriesIndex: 0, dataIndex: i });

  // 硬覆盖更新 markLine: 读出整个 option, 改第 0 个 series (K线) 的 markLine, 整体 replace
  const opt = chart.getOption();
  if (opt.series && opt.series[0]) {
    opt.series[0].markLine = {
      symbol: "none", silent: true, animation: false,
      lineStyle: { color: "#facc15", width: 2, type: "solid", opacity: 0.9 },
      label: {
        show: true, position: "insideEndTop", color: "#facc15",
        formatter: dateStr, fontSize: 12,
        backgroundColor: "rgba(15,23,42,0.85)", padding: [3, 6], borderRadius: 3,
      },
      data: [{ xAxis: dateStr }],
    };
    chart.setOption(opt, { notMerge: true });
  }

  // 若 i 超出当前 dataZoom 可视范围, 平移窗口让它居中
  const dz = opt.dataZoom && opt.dataZoom[0];
  if (dz && (dz.start !== undefined)) {
    const pct = (i / (n - 1)) * 100;
    const span = dz.end - dz.start;
    if (pct < dz.start || pct > dz.end) {
      let newStart = Math.max(0, pct - span / 2);
      let newEnd = Math.min(100, newStart + span);
      newStart = newEnd - span;
      chart.dispatchAction({ type: "dataZoom", start: newStart, end: newEnd });
    }
  }
  updateMetaForIndex(i);
}

function updateMetaForIndex(i) {
  if (!currentData) return;
  const d = currentData;
  const c = d.close[i], o = d.open[i], h = d.high[i], l = d.low[i], v = d.volume[i];
  const prev = i > 0 ? d.close[i - 1] : c;
  const chg = prev ? ((c - prev) / prev * 100) : 0;
  const sign = chg >= 0 ? "+" : "";
  const adjLabel = currentContract ? currentContract.adjustLabel : ({qfq:"前复权", hfq:"后复权", none:"不复权"}[d.adjust] || d.adjust);
  let txt = `${d.name || currentName} · ${d.code} · ${d.dates[i]} · ${adjLabel}`;
  txt += ` | 开 ${o.toFixed(2)} 高 ${h.toFixed(2)} 低 ${l.toFixed(2)} 收 ${c.toFixed(2)}`;
  txt += ` 涨跌 ${sign}${chg.toFixed(2)}% 量 ${v.toLocaleString()}`;
  if (currentContract && currentContract.adjustmentApplicable && d.adjust_requested && d.adjust_requested !== d.adjust) {
    txt += `  ⚠️ 旧数据无 adj 字段, 已回落为前复权`;
  }
  $meta.textContent = txt;
}

let debTimer = null;
$q.addEventListener("input", () => {
  clearTimeout(debTimer);
  debTimer = setTimeout(doSearch, 120);
});
$q.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const first = $sug.querySelector("li");
    if (first) first.click();
  } else if (e.key === "Escape") {
    $sug.classList.add("hidden");
  }
});
document.addEventListener("click", (e) => {
  if (!$sug.contains(e.target) && e.target !== $q) $sug.classList.add("hidden");
});

async function doSearch() {
  const q = $q.value.trim();
  if (!q) { $sug.classList.add("hidden"); return; }
  try {
    const r = await fetch("/api/search?q=" + encodeURIComponent(q));
    const j = await r.json();
    renderSuggest(j.hits || []);
  } catch (e) {
    $status.textContent = "搜索失败: " + e.message;
  }
}

function renderSuggest(hits) {
  $sug.innerHTML = "";
  if (!hits.length) { $sug.classList.add("hidden"); return; }
  for (const h of hits) {
    const li = document.createElement("li");
    li.innerHTML = `<span class="code">${h.code}</span> <span class="name">${h.name}</span> <span class="industry">${h.industry || ""}</span>`;
    li.addEventListener("click", () => {
      $sug.classList.add("hidden");
      $q.value = `${h.name} (${h.code})`;
      loadKline(h.code, h.name);
    });
    $sug.appendChild(li);
  }
  $sug.classList.remove("hidden");
}

async function loadKline(code, name) {
  const ownRequest = ++klineRequestNo;
  currentCode = code; currentName = name;
  // 换股票时清除上一只的因子叠加
  factorSeries = null; factorName = "";
  document.getElementById("f-clear").style.display = "none";
  const adjust = $adjust.value;
  $adjust.disabled = false;
  $adjust.title = "";
  const days = $days.value;
  $status.textContent = `加载 ${code} (${adjust}) · 正在检查 tushare 是否有新数据...`;
  try {
    const r = await fetch(`/api/kline?code=${code}&days=${days}&adjust=${adjust}`);
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      throw new Error(j.error || ("HTTP " + r.status));
    }
    const d = await r.json();
    if (ownRequest !== klineRequestNo) return;
    const contract = QIKline.assertPayload(d, adjust);
    $adjust.disabled = !contract.adjustmentApplicable;
    $adjust.title = contract.adjustmentApplicable ? "" : "指数不适用复权";
    currentData = d;
    currentContract = contract;
    drawChart(d);
    // 默认定位到最新交易日, 显示其十字线 + tooltip
    setIndex(d.dates.length - 1);
    renderFreshness(d.freshness);
    updateStar();
    $status.textContent = `完成 · ${contract.adjustLabel}${contract.qualityNotice ? ` · ${contract.qualityNotice}` : ""} · 键盘 ←/→ 切换日期, Home/End 跳首末`;
  } catch (e) {
    if (ownRequest !== klineRequestNo) return;
    currentData = null;
    currentContract = null;
    currentIndex = -1;
    chart.clear();
    $status.textContent = "失败: " + e.message;
  }
}

function getIndState() {
  return {
    boll: document.getElementById("ind-boll").checked,
    macd: document.getElementById("ind-macd").checked,
    rsi:  document.getElementById("ind-rsi").checked,
    kdj:  document.getElementById("ind-kdj").checked,
    bbw:  document.getElementById("ind-bbw").checked,
  };
}

function drawChart(d) {
  const upColor = "#ef4444", downColor = "#22c55e";
  const ind = getIndState();
  // ECharts candlestick expects [open, close, low, high] per row
  const kdata = d.dates.map((_, i) => [d.open[i], d.close[i], d.low[i], d.high[i]]);

  // 下方面板: 成交量(总在) + 选中的指标. 主图为 grid 0
  const lowerKeys = ["vol"];
  if (ind.macd) lowerKeys.push("macd");
  if (ind.rsi)  lowerKeys.push("rsi");
  if (ind.kdj)  lowerKeys.push("kdj");
  if (ind.bbw)  lowerKeys.push("bbw");
  if (factorSeries) lowerKeys.push("factor");

  // 动态纵向布局 (百分比): 主图权重3, 每个下方面板权重1
  const topPad = 6, bottomPad = 9, gap = 2.5;
  const usable = 100 - topPad - bottomPad;
  const totalW = 3 + lowerKeys.length;
  const unit = (usable - gap * lowerKeys.length) / totalW;
  const grids = [{ left: 60, right: 20, top: topPad + "%", height: (unit * 3) + "%" }];
  const gi = { main: 0 };
  let y = topPad + unit * 3 + gap;
  lowerKeys.forEach(k => {
    grids.push({ left: 60, right: 20, top: y + "%", height: unit + "%" });
    gi[k] = grids.length - 1;
    y += unit + gap;
  });
  const last = grids.length - 1;

  const xAxis = grids.map((_, idx) => ({
    type: "category", gridIndex: idx, data: d.dates, scale: true, boundaryGap: false,
    axisLine: { onZero: false }, axisTick: { show: idx === last },
    splitLine: { show: false }, axisLabel: { show: idx === last },
  }));
  const yAxis = grids.map((_, idx) => idx === 0
    ? { scale: true, splitArea: { show: true } }
    : { scale: true, gridIndex: idx, splitNumber: 2, axisLabel: { show: true, fontSize: 10 },
        axisLine: { show: false }, axisTick: { show: false }, splitLine: { show: false } });

  const legend = ["K线", "MA5", "MA10", "MA20", "MA60"];
  const series = [
    { name: "K线", type: "candlestick", xAxisIndex: 0, yAxisIndex: 0, data: kdata,
      itemStyle: { color: upColor, color0: downColor, borderColor: upColor, borderColor0: downColor } },
    makeMA("MA5", d.close, 5), makeMA("MA10", d.close, 10),
    makeMA("MA20", d.close, 20), makeMA("MA60", d.close, 60),
  ];

  if (ind.boll) {
    const b = computeBoll(d.close, 20, 2);
    legend.push("BOLL上", "BOLL中", "BOLL下");
    series.push(
      { name: "BOLL上", type: "line", data: b.up, showSymbol: false, smooth: true, lineStyle: { width: 1, color: "#a78bfa", type: "dashed" } },
      { name: "BOLL中", type: "line", data: b.mid, showSymbol: false, smooth: true, lineStyle: { width: 1, color: "#a78bfa" } },
      { name: "BOLL下", type: "line", data: b.low, showSymbol: false, smooth: true, lineStyle: { width: 1, color: "#a78bfa", type: "dashed" } },
    );
  }

  series.push({ name: "Volume", type: "bar", xAxisIndex: gi.vol, yAxisIndex: gi.vol,
    data: d.volume.map((v, i) => ({ value: v, itemStyle: { color: d.close[i] >= d.open[i] ? upColor : downColor } })) });

  if (ind.macd) {
    const m = computeMACD(d.close);
    legend.push("DIF", "DEA", "MACD");
    series.push(
      { name: "MACD", type: "bar", xAxisIndex: gi.macd, yAxisIndex: gi.macd,
        data: m.macd.map(v => ({ value: v, itemStyle: { color: (v !== "-" && v >= 0) ? upColor : downColor } })) },
      { name: "DIF", type: "line", xAxisIndex: gi.macd, yAxisIndex: gi.macd, data: m.dif, showSymbol: false, lineStyle: { width: 1, color: "#eab308" } },
      { name: "DEA", type: "line", xAxisIndex: gi.macd, yAxisIndex: gi.macd, data: m.dea, showSymbol: false, lineStyle: { width: 1, color: "#3b82f6" } },
    );
  }
  if (ind.rsi) {
    legend.push("RSI14");
    series.push({ name: "RSI14", type: "line", xAxisIndex: gi.rsi, yAxisIndex: gi.rsi,
      data: computeRSI(d.close, 14), showSymbol: false, lineStyle: { width: 1, color: "#f59e0b" } });
  }
  if (ind.kdj) {
    const k = computeKDJ(d.high, d.low, d.close, 9);
    legend.push("K", "D", "J");
    series.push(
      { name: "K", type: "line", xAxisIndex: gi.kdj, yAxisIndex: gi.kdj, data: k.k, showSymbol: false, lineStyle: { width: 1, color: "#eab308" } },
      { name: "D", type: "line", xAxisIndex: gi.kdj, yAxisIndex: gi.kdj, data: k.d, showSymbol: false, lineStyle: { width: 1, color: "#3b82f6" } },
      { name: "J", type: "line", xAxisIndex: gi.kdj, yAxisIndex: gi.kdj, data: k.j, showSymbol: false, lineStyle: { width: 1, color: "#ec4899" } },
    );
  }
  if (ind.bbw) {
    const bb = computeBoll(d.close, 20, 2);
    const bbw = bb.up.map((u, i) => (u === "-" || bb.low[i] === "-" || !bb.mid[i] || bb.mid[i] === "-") ? "-" : +((u - bb.low[i]) / bb.mid[i] * 100).toFixed(2));
    legend.push("布林带宽%");
    series.push({ name: "布林带宽%", type: "line", xAxisIndex: gi.bbw, yAxisIndex: gi.bbw,
      data: bbw, showSymbol: false, areaStyle: { color: "rgba(167,139,250,0.15)" }, lineStyle: { width: 1, color: "#a78bfa" } });
  }

  if (factorSeries) {
    legend.push("因子:" + factorName);
    series.push({ name: "因子:" + factorName, type: "line", xAxisIndex: gi.factor, yAxisIndex: gi.factor,
      data: factorSeries, showSymbol: false, connectNulls: true, lineStyle: { width: 1.5, color: "#34d399" } });
  }

  const allX = grids.map((_, i) => i);
  chart.setOption({
    animation: false,
    tooltip: { trigger: "axis", axisPointer: { type: "cross" } },
    axisPointer: { link: [{ xAxisIndex: "all" }] },
    legend: { data: legend, top: 0, type: "scroll" },
    grid: grids,
    xAxis, yAxis,
    dataZoom: [
      { type: "inside", xAxisIndex: allX, start: 70, end: 100 },
      { show: true, xAxisIndex: allX, type: "slider", bottom: 10, start: 70, end: 100 },
    ],
    series,
  }, true);
}

function renderFreshness(f) {
  const $f = document.getElementById("freshness");
  if (!f) { $f.classList.add("hidden"); return; }
  const status = f.status || "";
  const msg = f.message || "";
  let cls = "info", icon = "ℹ️";
  if (status === "appended") { cls = "ok"; icon = "✅"; }
  else if (status === "rebuilt") { cls = "ok"; icon = "🔄"; }
  else if (status === "up_to_date") { cls = "ok"; icon = "✓"; }
  else if (status === "stock_not_in_db" || status === "rebuild_failed" || status === "error") { cls = "warn"; icon = "⚠️"; }
  else if (msg.includes("暂未发布")) { cls = "warn"; icon = "⏳"; }

  let text = `${icon} ${msg || status}`;
  if (status === "appended" && f.appended_dates) {
    text += `  (本次补了 ${f.appended_dates} 天 → ${f.bin_last_date})`;
  } else if (status === "rebuilt") {
    text += `  (重建 ${f.n_days} 天, ${f.bin_first_date} ~ ${f.bin_last_date})`;
  } else if (status === "up_to_date" && f.bin_last_date) {
    text += `  最新数据日期: ${f.bin_last_date}`;
  }
  $f.className = "freshness " + cls;
  $f.textContent = text;
}

function makeMA(name, closes, win) {
  const data = closes.map((_, i) => {
    if (i < win - 1) return "-";
    let s = 0;
    for (let k = 0; k < win; k++) s += closes[i - k];
    return +(s / win).toFixed(3);
  });
  return { name, type: "line", data, smooth: true, showSymbol: false, lineStyle: { width: 1 } };
}

// ===== 技术指标 (客户端计算, 数据来自 /api/kline 的 OHLC) =====
function emaArr(arr, n) {
  const k = 2 / (n + 1); const out = []; let prev = arr.length ? arr[0] : 0;
  for (let i = 0; i < arr.length; i++) { prev = i === 0 ? arr[0] : arr[i] * k + prev * (1 - k); out.push(prev); }
  return out;
}
function computeMACD(close) {
  const e12 = emaArr(close, 12), e26 = emaArr(close, 26);
  const dif = close.map((_, i) => +(e12[i] - e26[i]).toFixed(4));
  const dea = emaArr(dif, 9).map(v => +v.toFixed(4));
  const macd = dif.map((_, i) => +((dif[i] - dea[i]) * 2).toFixed(4));
  return { dif, dea, macd };
}
function computeRSI(close, n) {
  const out = new Array(close.length).fill("-");
  if (close.length <= n) return out;
  let avgG = 0, avgL = 0;
  for (let i = 1; i <= n; i++) { const ch = close[i] - close[i - 1]; avgG += ch > 0 ? ch : 0; avgL += ch < 0 ? -ch : 0; }
  avgG /= n; avgL /= n;
  out[n] = avgL === 0 ? 100 : +(100 - 100 / (1 + avgG / avgL)).toFixed(2);
  for (let i = n + 1; i < close.length; i++) {
    const ch = close[i] - close[i - 1];
    avgG = (avgG * (n - 1) + (ch > 0 ? ch : 0)) / n;
    avgL = (avgL * (n - 1) + (ch < 0 ? -ch : 0)) / n;
    out[i] = avgL === 0 ? 100 : +(100 - 100 / (1 + avgG / avgL)).toFixed(2);
  }
  return out;
}
function computeKDJ(high, low, close, n) {
  const K = new Array(close.length).fill("-"), D = new Array(close.length).fill("-"), J = new Array(close.length).fill("-");
  let k = 50, d = 50;
  for (let i = 0; i < close.length; i++) {
    if (i < n - 1) continue;
    let hh = -Infinity, ll = Infinity;
    for (let j = i - n + 1; j <= i; j++) { if (high[j] > hh) hh = high[j]; if (low[j] < ll) ll = low[j]; }
    const rsv = hh === ll ? 50 : (close[i] - ll) / (hh - ll) * 100;
    k = 2 / 3 * k + 1 / 3 * rsv; d = 2 / 3 * d + 1 / 3 * k;
    K[i] = +k.toFixed(2); D[i] = +d.toFixed(2); J[i] = +(3 * k - 2 * d).toFixed(2);
  }
  return { k: K, d: D, j: J };
}
function computeBoll(close, n, mult) {
  const up = new Array(close.length).fill("-"), mid = new Array(close.length).fill("-"), low = new Array(close.length).fill("-");
  for (let i = n - 1; i < close.length; i++) {
    let s = 0; for (let j = i - n + 1; j <= i; j++) s += close[j];
    const m = s / n;
    let v = 0; for (let j = i - n + 1; j <= i; j++) v += (close[j] - m) ** 2;
    const sd = Math.sqrt(v / n);
    mid[i] = +m.toFixed(3); up[i] = +(m + mult * sd).toFixed(3); low[i] = +(m - mult * sd).toFixed(3);
  }
  return { up, mid, low };
}

// ===== 自选股 ⭐ =====
const $star = document.getElementById("star");
let watchSet = new Set();
async function loadWatchSet() {
  try { const j = await (await fetch("/api/watchlist")).json(); watchSet = new Set((j.items || []).map(x => x.code)); }
  catch (e) { watchSet = new Set(); }
  updateStar();
}
function updateStar() {
  if (!currentCode) { $star.disabled = true; $star.textContent = "☆ 自选"; return; }
  $star.disabled = false;
  const on = watchSet.has(currentCode);
  $star.textContent = on ? "★ 已自选" : "☆ 自选";
  $star.style.color = on ? "#facc15" : "";
}
$star.addEventListener("click", async () => {
  if (!currentCode) return;
  const on = watchSet.has(currentCode);
  const url = on ? "/api/watchlist/remove" : "/api/watchlist/add";
  try {
    await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ code: currentCode }) });
    if (on) watchSet.delete(currentCode); else watchSet.add(currentCode);
    updateStar();
  } catch (e) { $status.textContent = "自选操作失败: " + e.message; }
});
loadWatchSet();

// ===== 因子叠加 K 线 (Phase 4) =====
const $fBatch = document.getElementById("f-batch");
const $fName = document.getElementById("f-name");
const $fAdd = document.getElementById("f-add");
const $fClear = document.getElementById("f-clear");
let batchesData = [];
let factorPollTimer = null;

async function loadBatches() {
  try {
    const j = await (await fetch("/api/rdagent/batches")).json();
    batchesData = j.batches || [];
  } catch (e) { batchesData = []; }
  if (!batchesData.length) {
    $fBatch.innerHTML = '<option value="">无批次</option>'; $fName.innerHTML = ""; $fAdd.disabled = true; return;
  }
  $fBatch.innerHTML = batchesData.map((b, i) => `<option value="${i}">${b.label} (${b.n_factors||(b.factors||[]).length})</option>`).join("");
  fillFactors();
}
function fillFactors() {
  const b = batchesData[+$fBatch.value] || batchesData[0];
  const fs = (b && b.factors) || [];
  $fName.innerHTML = fs.map(f => `<option value="${f}">${f}</option>`).join("");
}
$fBatch.addEventListener("change", fillFactors);

$fAdd.addEventListener("click", async () => {
  if (!currentCode) { $status.textContent = "请先打开一只股票"; return; }
  const b = batchesData[+$fBatch.value]; if (!b) return;
  const factor = $fName.value; if (!factor) return;
  $fAdd.disabled = true;
  $status.textContent = `请求因子 ${factor} ... (PC 计算, 挖掘因子秒级 / Alpha158 首次约 30s)`;
  try {
    await fetch(`/api/factor/request?code=${currentCode}&factor=${encodeURIComponent(factor)}&batch=${encodeURIComponent(b.label)}`, {method:"POST"});
    if (factorPollTimer) clearInterval(factorPollTimer);
    let waited = 0;
    factorPollTimer = setInterval(async () => {
      waited += 2;
      let j;
      try { j = await (await fetch("/api/factor/values")).json(); } catch (e) { return; }
      const r = j.result;
      // 等到结果且匹配当前请求
      if (!j.pending && r && r.code === currentCode && r.factor === factor) {
        clearInterval(factorPollTimer); factorPollTimer = null; $fAdd.disabled = false;
        if (r.error || !r.dates || !r.dates.length) { $status.textContent = `因子获取失败: ${r.error || "无数据"}`; return; }
        applyFactor(r);
      } else if (waited > 90) {
        clearInterval(factorPollTimer); factorPollTimer = null; $fAdd.disabled = false;
        $status.textContent = "因子请求超时 (PC 未在线?)";
      } else {
        $status.textContent = `等待 PC 计算因子 ${factor}... ${waited}s` + (j.status && j.status.msg ? ` (${j.status.msg})` : "");
      }
    }, 2000);
  } catch (e) { $fAdd.disabled = false; $status.textContent = "因子请求失败: " + e.message; }
});

function applyFactor(r) {
  if (!currentData) return;
  const m = new Map();
  for (let i = 0; i < r.dates.length; i++) m.set(r.dates[i], r.values[i]);
  factorSeries = currentData.dates.map(d => (m.has(d) && m.get(d) !== null) ? m.get(d) : "-");
  factorName = `${r.factor}${r.source === "mined" ? "·挖掘" : ""}`;
  $fClear.style.display = "";
  drawChart(currentData);
  setIndex(currentIndex >= 0 ? currentIndex : currentData.dates.length - 1);
  $status.textContent = `已叠加因子 ${r.factor} (${r.dates.length} 点, ${r.source})`;
}
$fClear.addEventListener("click", () => {
  factorSeries = null; factorName = ""; $fClear.style.display = "none";
  if (currentData) { drawChart(currentData); setIndex(currentIndex >= 0 ? currentIndex : currentData.dates.length - 1); }
});
loadBatches();

// URL ?code=sh600519 直接打开该股 K 线
(function () {
  const code = new URLSearchParams(location.search).get("code");
  if (code) { $q.value = code; loadKline(code.trim().toLowerCase(), ""); }
})();

// 指标勾选: 持久化 + 切换重绘
["ind-boll", "ind-macd", "ind-rsi", "ind-kdj", "ind-bbw"].forEach(id => {
  const el = document.getElementById(id);
  if (localStorage.getItem(id) === "1") el.checked = true;
  el.addEventListener("change", () => {
    localStorage.setItem(id, el.checked ? "1" : "0");
    if (currentData) { drawChart(currentData); setIndex(currentIndex >= 0 ? currentIndex : currentData.dates.length - 1); }
  });
});
