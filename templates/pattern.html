<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>quantinvest · 杯柄形态</title>
<link rel="stylesheet" href="/static/style.css"/>
<script src="/static/echarts.min.js"></script>
<script src="/static/kline_contract.js"></script>
</head>
<body>
<header class="screen-header">
  <h1>☕ quantinvest</h1>
  {% include "_nav.html" %}
  <details class="usage"><summary>ℹ️ 这个页面怎么用</summary><div>扫描「杯柄」突破形态(欧奈尔)。出候选后<b>人工复核</b>形态与量能,别机械买入。</div></details>
  <div class="meta" id="meta">欧奈尔杯柄形态 (周线) · 找当前柄部成形、价逼近买点的股票, 按突破就绪度排序</div>
</header>

<div class="screen-layout">
  <aside class="screen-side">
    <div class="screen-criteria">
      <h3>☕ 形态参数</h3>
      <div class="c-row"><label>周期 <select id="tf"><option value="w" selected>周线</option><option value="d">日线</option></select></label></div>
      <div class="c-row"><label>杯深 % <input type="number" id="cup-depth-min" value="12" step="1" min="1" max="90" style="width:54px"> ~ <input type="number" id="cup-depth-max" value="50" step="1" min="1" max="90" style="width:54px"></label></div>
      <div class="c-row"><label>杯时长(<span id="cup-unit">周</span>) <input type="number" id="cup-min" value="7" step="1" min="3" max="400" style="width:54px"> ~ <input type="number" id="cup-max" value="65" step="1" min="5" max="500" style="width:54px"></label></div>
      <div class="c-row"><label>柄回撤上限 % <input type="number" id="handle-depth-max" value="15" step="1" min="2" max="40" style="width:54px"></label></div>
      <div class="c-row"><label>离买点容忍 % <input type="number" id="near-pivot-max" value="8" step="1" min="1" max="30" style="width:54px"></label></div>
      <div class="c-row"><label>前期涨势下限 % <input type="number" id="prior-gain-min" value="30" step="5" min="0" max="300" style="width:54px"></label></div>
      <div class="c-row"><label>最低日均成交额(万) <input type="number" id="min-amount" value="5000" step="1000" min="0" style="width:70px"></label></div>
      <div class="c-row period-checks">
        <label><input type="checkbox" id="ex-st" checked> 剔除 ST</label>
        <label><input type="checkbox" id="ex-new" checked> 剔除次新(上市&lt;1年)</label>
        <label><input type="checkbox" id="ex-board" checked> 剔除北交所/科创板</label>
      </div>
      <button id="btn-run">扫描全市场</button>
      <div id="hit-stat" class="hit-stat"></div>
    </div>
    <div class="screen-results">
      <table id="result-table">
        <thead id="result-thead"></thead>
        <tbody id="result-tbody"></tbody>
      </table>
    </div>
  </aside>

  <main class="screen-main">
    <div class="mini-controls">
      <label class="ctrl-group">复权:
        <select id="mini-adjust">
          <option value="qfq" selected>前复权</option>
          <option value="hfq">后复权</option>
          <option value="none">不复权</option>
        </select>
      </label>
    </div>
    <div class="kline-mini-header" id="kline-mini-header">点击左侧某只股票, 在这里看 K 线 (黄线=买点/枢轴)</div>
    <div id="chart-mini"></div>
    <div class="hint">↑/↓ 在结果表里切换股票</div>
  </main>
</div>

<script>
const $btn = document.getElementById("btn-run");
const $hitStat = document.getElementById("hit-stat");
const $thead = document.getElementById("result-thead");
const $tbody = document.getElementById("result-tbody");
const $miniHeader = document.getElementById("kline-mini-header");
const $miniAdjust = document.getElementById("mini-adjust");
const chart = echarts.init(document.getElementById("chart-mini"));
window.addEventListener("resize", () => chart.resize());
if (window.ResizeObserver) new ResizeObserver(() => chart.resize()).observe(document.getElementById("chart-mini"));

let results = [], selectedIdx = -1, miniRequestNo = 0;

$miniAdjust.addEventListener("change", () => {
  if (selectedIdx >= 0 && results[selectedIdx]) loadMiniKline(results[selectedIdx]);
});
$btn.addEventListener("click", runScan);

const $tf = document.getElementById("tf");
$tf.addEventListener("change", () => {
  const daily = $tf.value === "d";
  document.getElementById("cup-unit").textContent = daily ? "日" : "周";
  document.getElementById("cup-min").value = daily ? 35 : 7;
  document.getElementById("cup-max").value = daily ? 325 : 65;
});

function val(id) { return document.getElementById(id).value; }

async function runScan() {
  $btn.disabled = true;
  $hitStat.textContent = "扫描全市场中... (约需 0.5~2 分钟)";
  const qs = new URLSearchParams({
    tf: val("tf"),
    cup_depth_min: val("cup-depth-min"), cup_depth_max: val("cup-depth-max"),
    cup_min: val("cup-min"), cup_max: val("cup-max"),
    handle_depth_max: val("handle-depth-max"),
    near_pivot_max: val("near-pivot-max"),
    prior_gain_min: val("prior-gain-min"),
    min_amount: val("min-amount"),
    ex_st: document.getElementById("ex-st").checked ? "1" : "0",
    ex_new: document.getElementById("ex-new").checked ? "1" : "0",
    ex_board: document.getElementById("ex-board").checked ? "1" : "0",
    limit: "0",
  });
  try {
    const r = await fetch("/api/pattern?" + qs.toString());
    const j = await r.json();
    if (j.error) { $hitStat.innerHTML = `<span class="warn">⚠️ ${j.error}</span>`; return; }
    results = j.hits || [];
    $hitStat.textContent = `命中 ${j.total_matched} 只 (扫描 ${j.scanned} 只有效股), 全部显示 · ${j.today}`;
    renderTable();
    if (results.length > 0) selectRow(0);
  } catch (e) {
    $hitStat.innerHTML = `<span class="warn">⚠️ ${e.message}</span>`;
  } finally {
    $btn.disabled = false;
  }
}

function renderTable() {
  $thead.innerHTML = `<tr>
    <th>#</th><th>代码</th><th>名称</th><th>行业</th>
    <th title="现价">现价</th><th title="买点(枢轴)">买点</th><th title="现价距买点, 负=已突破">距买点</th>
    <th title="杯深">杯深</th><th title="杯时长(周)">杯</th><th title="柄时长(周)">柄</th>
    <th title="柄部相对杯均量的缩量幅度">缩量</th><th title="相对强度(26周收益百分位)">RS</th>
    <th title="突破就绪度评分">就绪</th>
  </tr>`;
  $tbody.innerHTML = "";
  results.forEach((h, i) => {
    const distCls = h.dist_pct <= 0 ? "pos" : (h.dist_pct <= 3 ? "" : "neg");
    const row = document.createElement("tr");
    row.dataset.idx = i;
    row.innerHTML = `
      <td>${i + 1}</td>
      <td class="code">${h.code}</td>
      <td>${h.name}</td>
      <td class="industry">${h.industry || ""}</td>
      <td class="num">${h.close.toFixed(2)}</td>
      <td class="num">${h.pivot.toFixed(2)}</td>
      <td class="num ${distCls}">${h.dist_pct.toFixed(1)}%</td>
      <td class="num">${h.cup_depth_pct.toFixed(0)}%</td>
      <td class="num">${h.cup_weeks}</td>
      <td class="num">${h.handle_weeks}</td>
      <td class="num">${h.vol_dryup_pct.toFixed(0)}%</td>
      <td class="num">${h.rs == null ? "—" : h.rs}</td>
      <td class="num roe">${h.score.toFixed(0)}</td>`;
    row.addEventListener("click", () => selectRow(i));
    $tbody.appendChild(row);
  });
}

function selectRow(i) {
  if (i < 0 || i >= results.length) return;
  const prev = $tbody.querySelector("tr.selected");
  if (prev) prev.classList.remove("selected");
  const row = $tbody.querySelector(`tr[data-idx="${i}"]`);
  if (row) { row.classList.add("selected"); row.scrollIntoView({ block: "nearest", behavior: "smooth" }); }
  selectedIdx = i;
  loadMiniKline(results[i]);
}

async function loadMiniKline(hit) {
  const ownRequest = ++miniRequestNo;
  $miniHeader.textContent = `${hit.name} · ${hit.code}  (加载中...)`;
  try {
    const adjust = $miniAdjust.value;
    const r = await fetch(`/api/kline?code=${hit.code}&days=0&adjust=${adjust}&refresh=0`);
    if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || ("HTTP " + r.status)); }
    const d = await r.json();
    if (ownRequest !== miniRequestNo) return;
    const contract = QIKline.assertPayload(d, adjust);
    drawMini(d, hit);
    const priceContext = contract.adjust === "qfq"
      ? ` | 买点 ${hit.pivot.toFixed(2)} (黄线), 现价 ${hit.close.toFixed(2)}, 距买点 ${hit.dist_pct.toFixed(1)}%`
      : " | 形态价格点位采用前复权口径，本图不叠加买点线";
    $miniHeader.textContent =
      `${hit.name} · ${hit.code} · ${hit.industry || ""} · ${contract.adjustLabel}` +
      priceContext +
      ` | 杯 ${hit.left_rim}~${hit.right_rim} 深${hit.cup_depth_pct}% 柄${hit.handle_weeks}周` +
      (contract.qualityNotice ? ` | ${contract.qualityNotice}` : "");
  } catch (e) {
    if (ownRequest !== miniRequestNo) return;
    $miniHeader.textContent = "K 线加载失败: " + e.message;
  }
}

// 把缩放窗口定位到"左杯沿前留一点 ~ 至今", 让杯柄填满视图
function frameStart(dates, leftRim) {
  if (!leftRim || dates.length < 2) return 50;
  let li = dates.findIndex(x => x >= leftRim);
  if (li < 0) li = 0;
  const n = dates.length;
  const lead = Math.round(0.15 * (n - 1 - li));   // 杯前再留 ~15% 做上下文
  const startIdx = Math.max(0, li - lead);
  return Math.max(0, Math.min(95, startIdx / (n - 1) * 100));
}

function drawMini(d, hit) {
  const kdata = d.dates.map((_, i) => [d.open[i], d.close[i], d.low[i], d.high[i]]);
  const up = "#ef4444", down = "#22c55e";
  const zs = frameStart(d.dates, hit.left_rim);
  // 买点仅在前复权下与 hit.pivot 同口径(检测基于 qfq); 其他复权不画线避免误导
  const showPivot = (d.adjust === "qfq");
  const candle = {
    name: "K线", type: "candlestick", data: kdata,
    itemStyle: { color: up, color0: down, borderColor: up, borderColor0: down },
  };
  if (showPivot) {
    candle.markLine = {
      symbol: "none", silent: true,
      lineStyle: { color: "#facc15", width: 1.5, type: "dashed" },
      label: { show: true, position: "insideEndTop", color: "#facc15", formatter: "买点 " + hit.pivot.toFixed(2) },
      data: [{ yAxis: hit.pivot }],
    };
  }
  chart.setOption({
    animation: false,
    tooltip: { trigger: "axis", axisPointer: { type: "cross" } },
    legend: { data: ["K线", "MA5", "MA10", "MA20", "MA60"], top: 0 },
    grid: [
      { left: 50, right: 15, top: 30, height: "58%" },
      { left: 50, right: 15, top: "72%", height: "18%" },
    ],
    xAxis: [
      { type: "category", data: d.dates, scale: true, boundaryGap: false,
        axisLine: { onZero: false }, splitLine: { show: false }, axisLabel: { show: false } },
      { type: "category", gridIndex: 1, data: d.dates, scale: true, boundaryGap: false,
        axisLine: { onZero: false }, axisTick: { show: false }, splitLine: { show: false }, axisLabel: { fontSize: 10 } },
    ],
    yAxis: [
      { scale: true, splitArea: { show: true } },
      { scale: true, gridIndex: 1, splitNumber: 2, axisLabel: { show: false }, axisLine: { show: false },
        axisTick: { show: false }, splitLine: { show: false } },
    ],
    dataZoom: [
      { type: "inside", xAxisIndex: [0, 1], start: zs, end: 100 },
      { show: true, xAxisIndex: [0, 1], type: "slider", top: "93%", start: zs, end: 100 },
    ],
    series: [
      candle,
      makeMA("MA5", d.close, 5), makeMA("MA10", d.close, 10),
      makeMA("MA20", d.close, 20), makeMA("MA60", d.close, 60),
      { name: "Volume", type: "bar", xAxisIndex: 1, yAxisIndex: 1,
        data: d.volume.map((v, i) => ({ value: v, itemStyle: { color: d.close[i] >= d.open[i] ? up : down } })) },
    ],
  }, true);
}

function makeMA(name, closes, win) {
  const data = closes.map((_, i) => {
    if (i < win - 1) return "-";
    let s = 0; for (let k = 0; k < win; k++) s += closes[i - k];
    return +(s / win).toFixed(3);
  });
  return { name, type: "line", data, smooth: true, showSymbol: false, lineStyle: { width: 1 } };
}

document.addEventListener("keydown", (e) => {
  if (results.length === 0) return;
  const tag = (document.activeElement && document.activeElement.tagName) || "";
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === "ArrowDown") { e.preventDefault(); selectRow(Math.min(results.length - 1, selectedIdx + 1)); }
  else if (e.key === "ArrowUp") { e.preventDefault(); selectRow(Math.max(0, selectedIdx - 1)); }
  else if (e.key === "Home") { e.preventDefault(); selectRow(0); }
  else if (e.key === "End") { e.preventDefault(); selectRow(results.length - 1); }
});
</script>
</body>
</html>
