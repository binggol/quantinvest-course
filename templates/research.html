<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>研究台 · quantinvest</title>
<link rel="stylesheet" href="/static/style.css"/>
<style>
  .wrap{max-width:1100px;margin:0 auto;padding:16px}
  .hd{margin:8px 0 4px;font-size:22px;font-weight:700}
  .sub{color:#94a3b8;line-height:1.7;margin-bottom:18px}
  .prod{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:12px 16px;margin-bottom:20px}
  .prod b{color:#a855f7}
  .card{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px 16px;margin-bottom:14px}
  .card h3{margin:0 0 6px;font-size:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tldr{color:#cbd5e1;line-height:1.65;margin:4px 0 10px;font-size:13.5px}
  .badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:700;white-space:nowrap}
  .neg{background:#3f1d1d;color:#f87171;border:1px solid #7f1d1d}
  .pos{background:#14342a;color:#34d399;border:1px solid #166534}
  .mar{background:#3a330f;color:#fbbf24;border:1px solid #78610f}
  table{border-collapse:collapse;width:100%;font-size:12.5px;margin-top:4px}
  th,td{border:1px solid #1e293b;padding:5px 9px;text-align:right}
  th:first-child,td:first-child{text-align:left;color:#cbd5e1}
  th{background:#111827;color:#94a3b8;font-weight:600}
  .prog{background:#1a2433;border:1px solid #2a4a6a;border-radius:10px;padding:13px 16px;margin-bottom:14px}
  .prog h3{margin:0 0 6px;font-size:15px;color:#60a5fa}
  .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:#3b82f6;margin-right:6px;animation:p 1.4s infinite}
  @keyframes p{0%,100%{opacity:.3}50%{opacity:1}}
  .lessons{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px 16px}
  .lessons li{color:#cbd5e1;line-height:1.9;font-size:13.5px}
  .upd{color:#64748b;font-size:12px}
</style>
</head>
<body>
  {% include "_nav.html" %}
  <details class="usage"><summary>ℹ️ 这个页面怎么用</summary><div>因子/策略调查结论台,正负结果都诚实记录。<b>防止重复测已证伪的东西</b>;开新研究前先翻这里。</div></details>
  <div class="wrap">
    <div id="content">加载中…</div>
  </div>
<script>
const BADGE={negative:["neg","✗ 证伪"],positive:["pos","✓ 成立"],marginal:["mar","△ 边际"]};
function tableHTML(t){
  if(!t) return "";
  let h="<table><thead><tr>"+t.cols.map(c=>`<th>${c}</th>`).join("")+"</tr></thead><tbody>";
  h+=t.rows.map(r=>"<tr>"+r.map(c=>`<td>${c}</td>`).join("")+"</tr>").join("");
  return h+"</tbody></table>";
}
fetch("/api/research").then(r=>r.json()).then(d=>{
  if(d.message&&!(d.investigations||[]).length){
    document.getElementById("content").innerHTML=`<div class="sub">${d.message}</div>`;return;}
  let h=`<div class="hd">${d.title||"研究台"}</div>`;
  h+=`<div class="upd">更新 ${d.updated||""}</div>`;
  h+=`<div class="sub">${d.summary||""}</div>`;
  if(d.production){const p=d.production;
    h+=`<div class="prod">🏭 <b>生产策略</b> · ${p.name} · ${p.sharpe} · ${p.status}</div>`;}
  (d.inprogress||[]).forEach(p=>{
    h+=`<div class="prog"><h3><span class="pulse"></span>${p.title} · ${p.status}</h3><div class="tldr">${p.detail}</div></div>`;});
  (d.investigations||[]).forEach(v=>{
    const b=BADGE[v.verdict]||["mar","—"];
    h+=`<div class="card"><h3>${v.title} <span class="badge ${b[0]}">${b[1]}</span></h3>`;
    h+=`<div class="tldr">${v.tldr||""}</div>${tableHTML(v.table)}</div>`;});
  if((d.lessons||[]).length){
    h+=`<div class="lessons"><h3 style="margin:0 0 8px;font-size:15px">📌 沉淀的铁律</h3><ul>`;
    h+=d.lessons.map(l=>`<li>${l}</li>`).join("")+"</ul></div>";}
  document.getElementById("content").innerHTML=h;
}).catch(e=>{document.getElementById("content").innerHTML=`<div class="sub">加载失败: ${e}</div>`;});
</script>
</body>
</html>
